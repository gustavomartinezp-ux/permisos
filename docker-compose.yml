version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cesfam_db
    environment:
      POSTGRES_DB: cesfam_permisos
      POSTGRES_USER: cesfam_admin
      POSTGRES_PASSWORD: cesfam_2026_secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cesfam_admin -d cesfam_permisos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
