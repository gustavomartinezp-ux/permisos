version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cesfam_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cesfam_permisos}
      POSTGRES_USER: ${POSTGRES_USER:-cesfam_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
